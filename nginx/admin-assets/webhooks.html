<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JoeMail Admin - Webhooks</title>
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Kadwa:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.bunny.net/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="logo-icon">J</div>
                <div>
                    <h1>JoeMail</h1>
                    <p>Admin Console</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-group">
                    <div class="nav-label">Main</div>
                    <a class="nav-item" data-page="dashboard" href="/admin/dashboard.html">
                        <i class="fas fa-chart-pie"></i><span>Dashboard</span>
                    </a>
                    <a class="nav-item" data-page="emails" href="/admin/emails.html">
                        <i class="fas fa-envelope"></i><span>Emails</span>
                    </a>
                    <a class="nav-item" data-page="domains" href="/admin/domains.html">
                        <i class="fas fa-globe"></i><span>Domains</span>
                    </a>
                </div>
                <div class="nav-group">
                    <div class="nav-label">System</div>
                    <a class="nav-item active" data-page="webhooks" href="/admin/webhooks.html">
                        <i class="fas fa-link"></i><span>Webhooks</span>
                    </a>
                    <a class="nav-item" data-page="stats" href="/admin/stats.html">
                        <i class="fas fa-chart-bar"></i><span>Statistics</span>
                    </a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="nav-item" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
            </div>
        </aside>

        <main class="main-wrap">
            <header class="app-header">
                <div class="header-left">
                    <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <span class="header-title">Webhooks</span>
                </div>
                <div class="header-right">
                    <div class="header-badge"><span class="dot"></span><span>Online</span></div>
                    <button class="btn-ghost" onclick="window.open('/', '_blank')"><i class="fas fa-external-link-alt"></i> Frontend</button>
                </div>
            </header>
            <div class="content" id="content">
                <div class="empty-state"><div class="spinner" style="margin:0 auto;"></div></div>
            </div>
        </main>
    </div>
    <div id="toast" class="toast"></div>
    <script src="admin.js"></script>
    <script>
        if (!requireAuth()) location.href = '/admin/';

        async function loadWebhooks() {
            try {
                const data = await api('/webhooks');
                if (!data.success) throw new Error(data.message);
                const d = data.data;
                document.getElementById('content').innerHTML = `
                    <h2 class="page-title">Webhooks</h2>
                    <p class="page-subtitle">Manage webhook endpoints</p>
                    <div class="card">
                        <div class="card-header">
                            <h3>Configured Webhooks</h3>
                            <span class="badge">${(d.webhooks || []).length} webhooks</span>
                        </div>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>URL</th><th>Events</th><th>Status</th><th>OK</th><th>Fail</th><th>Last</th></tr></thead>
                                <tbody>
                                    ${(d.webhooks || []).map(w => `<tr>
                                        <td style="max-width:260px; overflow:hidden; text-overflow:ellipsis;">${w.url}</td>
                                        <td>${w.events}</td>
                                        <td><span class="status ${w.isActive ? 'ok' : 'error'}">${w.isActive ? 'Active' : 'Off'}</span></td>
                                        <td>${w.successCount}</td>
                                        <td>${w.failureCount}</td>
                                        <td>${formatDate(w.lastTriggered)}</td>
                                    </tr>`).join('') || '<tr><td colspan="6" class="empty-state">No webhooks</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            } catch (e) {
                document.getElementById('content').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${e.message}</p></div>`;
            }
        }

        loadWebhooks();
    </script>
</body>
</html>
