<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JoeMail Admin - Dashboard</title>
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Kadwa:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.bunny.net/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="logo-icon">J</div>
                <div>
                    <h1>JoeMail</h1>
                    <p>Admin Console</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-group">
                    <div class="nav-label">Main</div>
                    <a class="nav-item active" data-page="dashboard" href="/admin/dashboard.html">
                        <i class="fas fa-chart-pie"></i><span>Dashboard</span>
                    </a>
                    <a class="nav-item" data-page="emails" href="/admin/emails.html">
                        <i class="fas fa-envelope"></i><span>Emails</span>
                    </a>
                    <a class="nav-item" data-page="domains" href="/admin/domains.html">
                        <i class="fas fa-globe"></i><span>Domains</span>
                    </a>
                </div>
                <div class="nav-group">
                    <div class="nav-label">System</div>
                    <a class="nav-item" data-page="webhooks" href="/admin/webhooks.html">
                        <i class="fas fa-link"></i><span>Webhooks</span>
                    </a>
                    <a class="nav-item" data-page="stats" href="/admin/stats.html">
                        <i class="fas fa-chart-bar"></i><span>Statistics</span>
                    </a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="nav-item" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
            </div>
        </aside>

        <main class="main-wrap">
            <header class="app-header">
                <div class="header-left">
                    <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <span class="header-title">Dashboard</span>
                </div>
                <div class="header-right">
                    <div class="header-badge"><span class="dot"></span><span>Online</span></div>
                    <button class="btn-ghost" onclick="window.open('/', '_blank')"><i class="fas fa-external-link-alt"></i> Frontend</button>
                </div>
            </header>
            <div class="content" id="content">
                <div class="empty-state"><div class="spinner" style="margin:0 auto;"></div></div>
            </div>
        </main>
    </div>
    <div id="toast" class="toast"></div>
    <script src="admin.js"></script>
    <script>
        if (!requireAuth()) location.href = '/admin/';

        async function loadDashboard() {
            try {
                const data = await api('/dashboard');
                if (!data.success) throw new Error(data.message);
                const d = data.data;
                document.getElementById('content').innerHTML = `
                    <h2 class="page-title">Dashboard</h2>
                    <p class="page-subtitle">Overview of your JoeMail instance</p>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-envelope"></i></div>
                            <div class="stat-value">${d.stats.totalEmails || 0}</div>
                            <div class="stat-label">Total Emails</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                            <div class="stat-value">${d.stats.totalAddresses || 0}</div>
                            <div class="stat-label">Addresses</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-globe"></i></div>
                            <div class="stat-value">${d.stats.totalDomains || 0}</div>
                            <div class="stat-label">Domains</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-clock"></i></div>
                            <div class="stat-value">${Math.round(d.systemHealth.uptime / 60)}m</div>
                            <div class="stat-label">Uptime</div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3>Recent Emails</h3>
                            <span class="badge">${(d.recentEmails || []).length} recent</span>
                        </div>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>Email</th><th>From</th><th>Subject</th><th>Date</th></tr></thead>
                                <tbody>
                                    ${(d.recentEmails || []).map(e => `<tr><td>${e.email}</td><td>${e.from || '-'}</td><td>${e.subject || '-'}</td><td>${formatDate(e.date)}</td></tr>`).join('') || '<tr><td colspan="4" class="empty-state">No emails yet</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            } catch (e) {
                document.getElementById('content').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${e.message}</p></div>`;
            }
        }

        loadDashboard();
    </script>
</body>
</html>
