<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JoeMail Admin</title>
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Kadwa:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.bunny.net/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0a;
            --bg-card: #141414;
            --bg-card-hover: #1a1a1a;
            --bg-input: #1a1a1a;
            --bg-button: #1e1e1e;
            --bg-button-hover: #2a2a2a;
            --accent: #e5e5e5;
            --accent-hover: #ffffff;
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.15);
            --text: #fafafa;
            --text-secondary: #a0a0a0;
            --text-muted: #666;
            --success: #4ade80;
            --warning: #fbbf24;
            --danger: #f87171;
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --sidebar-width: 220px;
            --header-height: 52px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* LOGIN */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 20px;
        }
        .login-card {
            width: 100%; max-width: 360px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 36px 32px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
        .login-brand { margin-bottom: 28px; }
        .login-brand .logo-icon {
            width: 52px; height: 52px; border-radius: 14px;
            background: var(--accent); display: grid; place-items: center;
            margin: 0 auto 12px; font-size: 22px; font-weight: 900; color: var(--bg); font-family: 'Kadwa', serif;
        }
        .login-brand h1 { font-family: 'Kadwa', serif; font-size: 20px; font-weight: 700; }
        .login-brand p { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
        .login-card input {
            width: 100%; padding: 12px 14px; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: var(--radius-xs);
            color: var(--text); font-size: 14px; margin-bottom: 12px; transition: border-color 0.2s;
        }
        .login-card input:focus { outline: none; border-color: var(--accent); }
        .login-card input::placeholder { color: var(--text-muted); }
        .btn-login {
            width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
            border: none; border-radius: var(--radius-xs); background: var(--accent); color: var(--bg);
            cursor: pointer; transition: background 0.15s, transform 0.1s; margin-top: 4px;
        }
        .btn-login:hover { background: var(--accent-hover); }
        .btn-login:active { transform: scale(0.97); }
        .login-error { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 18px; }

        /* LAYOUT */
        .app-layout { display: flex; min-height: 100vh; }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-width); background: var(--bg-card);
            border-right: 1px solid var(--border); display: flex; flex-direction: column;
            position: fixed; top: 0; left: 0; bottom: 0; z-index: 40; transition: transform 0.2s;
        }
        .sidebar-brand {
            padding: 14px 16px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 10px;
        }
        .sidebar-brand .logo-icon {
            width: 34px; height: 34px; border-radius: 10px;
            background: var(--accent); display: grid; place-items: center;
            font-size: 15px; font-weight: 900; color: var(--bg); font-family: 'Kadwa', serif;
        }
        .sidebar-brand h1 { font-family: 'Kadwa', serif; font-size: 15px; font-weight: 700; }
        .sidebar-brand p { font-size: 10px; color: var(--text-muted); }
        .sidebar-nav { flex: 1; padding: 10px 8px; overflow-y: auto; }
        .nav-group { margin-bottom: 14px; }
        .nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); padding: 6px 10px 3px; }
        .nav-item {
            display: flex; align-items: center; gap: 10px; padding: 9px 10px;
            border-radius: var(--radius-xs); color: var(--text-secondary); cursor: pointer;
            transition: all 0.15s; font-size: 13px; font-weight: 500;
            border: none; background: none; width: 100%; text-align: left;
        }
        .nav-item:hover { background: var(--bg-button-hover); color: var(--text); }
        .nav-item.active { background: var(--bg-button-hover); color: var(--text); border-left: 2px solid var(--accent); }
        .nav-item i { width: 18px; text-align: center; font-size: 13px; }
        .sidebar-footer { padding: 10px 8px; border-top: 1px solid var(--border); }

        /* MAIN */
        .main-wrap { flex: 1; margin-left: var(--sidebar-width); min-height: 100vh; }

        /* HEADER */
        .app-header {
            height: var(--header-height); background: rgba(10,10,10,0.9);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; position: sticky; top: 0; z-index: 30;
        }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .mobile-toggle { display: none; background: none; border: none; color: var(--text); font-size: 18px; cursor: pointer; }
        .header-title { font-size: 14px; font-weight: 600; }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .header-badge {
            display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px;
            border-radius: 999px; border: 1px solid var(--border); background: var(--bg-card);
            font-size: 11px; color: var(--text-secondary);
        }
        .header-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* BUTTONS */
        .btn-ghost {
            padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius-xs);
            background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 12px; transition: all 0.15s;
        }
        .btn-ghost:hover { background: var(--bg-button); color: var(--text); }
        .btn-primary {
            padding: 8px 14px; border: 1px solid var(--border-hover); border-radius: var(--radius-xs);
            background: var(--accent); color: var(--bg); cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-danger {
            padding: 6px 12px; border: 1px solid rgba(248,113,113,0.3); border-radius: var(--radius-xs);
            background: transparent; color: var(--danger); cursor: pointer; font-size: 12px; transition: all 0.15s;
        }
        .btn-danger:hover { background: rgba(248,113,113,0.1); }
        .btn-sm { padding: 5px 10px; font-size: 11px; }

        /* CONTENT */
        .content { padding: 20px; }
        .page-title { font-family: 'Kadwa', serif; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .page-subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }

        /* STATS GRID */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 16px; transition: all 0.15s;
        }
        .stat-card:hover { border-color: var(--border-hover); }
        .stat-card .stat-icon {
            width: 32px; height: 32px; border-radius: 8px;
            background: var(--bg-button); display: grid; place-items: center;
            margin-bottom: 10px; font-size: 14px; color: var(--text-secondary);
        }
        .stat-card .stat-value { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 2px; }
        .stat-card .stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }

        /* CARDS */
        .card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px; margin-bottom: 14px;
        }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .card-header h3 { font-size: 14px; font-weight: 700; }
        .card-header .badge { font-size: 11px; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-secondary); }

        /* TABLES */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: 13px; }
        th { color: var(--text-muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        /* STATUS */
        .status {
            display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px;
            border-radius: 999px; font-size: 11px; font-weight: 600;
        }
        .status.ok { background: rgba(74,222,128,0.12); color: var(--success); border: 1px solid rgba(74,222,128,0.25); }
        .status.warning { background: rgba(251,191,36,0.12); color: var(--warning); border: 1px solid rgba(251,191,36,0.25); }
        .status.error { background: rgba(248,113,113,0.12); color: var(--danger); border: 1px solid rgba(248,113,113,0.25); }

        /* FORMS */
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; }
        .form-input {
            width: 100%; padding: 9px 12px; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: var(--radius-xs);
            color: var(--text); font-size: 13px; transition: border-color 0.2s;
        }
        .form-input:focus { outline: none; border-color: var(--accent); }
        .form-input::placeholder { color: var(--text-muted); }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }

        /* DNS RECORD BOX */
        .dns-box {
            background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
            padding: 12px; margin-top: 8px; font-family: 'Courier New', monospace; font-size: 12px;
            color: var(--text-secondary); position: relative; line-height: 1.6;
        }
        .dns-box .copy-btn {
            position: absolute; top: 8px; right: 8px; padding: 4px 8px;
            background: var(--bg-button); border: 1px solid var(--border); border-radius: var(--radius-xs);
            color: var(--text-secondary); cursor: pointer; font-size: 11px; transition: all 0.15s;
        }
        .dns-box .copy-btn:hover { background: var(--bg-button-hover); color: var(--text); }
        .dns-record-type { color: var(--accent); font-weight: 700; }
        .dns-record-name { color: var(--success); }
        .dns-record-value { color: var(--warning); word-break: break-all; }

        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); z-index: 50; align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
            animation: fadeIn 0.2s ease;
        }
        .modal h2 { font-family: 'Kadwa', serif; font-size: 18px; margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

        /* TOAST */
        .toast {
            position: fixed; bottom: 20px; right: 20px; padding: 10px 18px;
            background: var(--accent); color: var(--bg); border-radius: var(--radius-xs);
            font-weight: 600; font-size: 13px; transform: translateY(100px); opacity: 0;
            transition: all 0.3s; z-index: 100;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { background: var(--danger); }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .main-wrap { margin-left: 0; }
            .mobile-toggle { display: block; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .form-row { flex-direction: column; }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

        .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 36px 16px; color: var(--text-muted); }
        .empty-state i { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
        .empty-state p { font-size: 13px; }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="login-page" class="login-page">
        <div class="login-card">
            <div class="login-brand">
                <div class="logo-icon">J</div>
                <h1>JoeMail Admin</h1>
                <p>Mail operations console</p>
            </div>
            <input type="text" id="login-username" placeholder="Username" autocomplete="username">
            <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
            <button class="btn-login" onclick="doLogin()">Sign In</button>
            <div id="login-error" class="login-error"></div>
        </div>
    </div>

    <!-- APP -->
    <div id="app-layout" class="app-layout" style="display: none;">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="logo-icon">J</div>
                <div>
                    <h1>JoeMail</h1>
                    <p>Admin Console</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-group">
                    <div class="nav-label">Main</div>
                    <button class="nav-item active" data-page="dashboard"><i class="fas fa-chart-pie"></i><span>Dashboard</span></button>
                    <button class="nav-item" data-page="emails"><i class="fas fa-envelope"></i><span>Emails</span></button>
                    <button class="nav-item" data-page="domains"><i class="fas fa-globe"></i><span>Domains</span></button>
                </div>
                <div class="nav-group">
                    <div class="nav-label">System</div>
                    <button class="nav-item" data-page="webhooks"><i class="fas fa-link"></i><span>Webhooks</span></button>
                    <button class="nav-item" data-page="stats"><i class="fas fa-chart-bar"></i><span>Statistics</span></button>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="nav-item" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
            </div>
        </aside>

        <main class="main-wrap">
            <header class="app-header">
                <div class="header-left">
                    <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <span class="header-title" id="page-title">Dashboard</span>
                </div>
                <div class="header-right">
                    <div class="header-badge"><span class="dot"></span><span>Online</span></div>
                    <button class="btn-ghost" onclick="location.href='/'"><i class="fas fa-external-link-alt"></i> Frontend</button>
                </div>
            </header>
            <div class="content" id="content"></div>
        </main>
    </div>

    <!-- ADD DOMAIN MODAL -->
    <div id="modal-add-domain" class="modal-overlay">
        <div class="modal">
            <h2><i class="fas fa-globe"></i> Add Domain</h2>
            <div class="form-group">
                <label>Domain Name</label>
                <input type="text" id="new-domain" class="form-input" placeholder="example.com">
            </div>
            <div id="dns-instructions" style="display:none;">
                <p style="font-size:13px; color:var(--text-secondary); margin-bottom:12px;">Add these DNS records to your domain (Cloudflare or other DNS provider):</p>
                <div id="dns-records-list"></div>
            </div>
            <div class="modal-actions">
                <button class="btn-ghost" onclick="closeModal('modal-add-domain')">Cancel</button>
                <button class="btn-primary" id="btn-add-domain" onclick="addDomain()">Add Domain</button>
            </div>
        </div>
    </div>

    <!-- DOMAIN DETAIL MODAL -->
    <div id="modal-domain-detail" class="modal-overlay">
        <div class="modal">
            <h2><i class="fas fa-globe"></i> <span id="detail-domain-name"></span></h2>
            <div id="domain-detail-content"></div>
            <div class="modal-actions">
                <button class="btn-ghost" onclick="closeModal('modal-domain-detail')">Close</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API = '/api/admin';
        let token = localStorage.getItem('admin_token');

        // ===== AUTH =====
        function doLogin() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            fetch(API + '/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.data && data.data.token) {
                    token = data.data.token;
                    localStorage.setItem('admin_token', token);
                    showApp();
                } else {
                    errorEl.textContent = data.message || 'Invalid credentials';
                }
            }).catch(() => { errorEl.textContent = 'Connection error'; });
        }

        function doLogout() {
            token = null;
            localStorage.removeItem('admin_token');
            document.getElementById('app-layout').style.display = 'none';
            document.getElementById('login-page').style.display = 'flex';
        }

        function showApp() {
            document.getElementById('login-page').style.display = 'none';
            document.getElementById('app-layout').style.display = 'flex';
            loadPage('dashboard');
        }

        // ===== NAV =====
        document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-item[data-page]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                loadPage(btn.dataset.page);
                if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
            });
        });

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

        // ===== API =====
        async function api(path, opts = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            const res = await fetch(API + path, { ...opts, headers: { ...headers, ...opts.headers } });
            if (res.status === 401) { doLogout(); throw new Error('Session expired'); }
            return res.json();
        }

        function toast(msg, type = 'success') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show' + (type === 'error' ? ' error' : '');
            setTimeout(() => el.className = 'toast', 3000);
        }

        function formatDate(str) {
            if (!str) return '-';
            const d = new Date(str);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        function openModal(id) { document.getElementById(id).classList.add('show'); }

        // ===== PAGES =====
        async function loadPage(page) {
            const content = document.getElementById('content');
            const title = document.getElementById('page-title');
            switch (page) {
                case 'dashboard': title.textContent = 'Dashboard'; await loadDashboard(content); break;
                case 'emails': title.textContent = 'Emails'; await loadEmails(content); break;
                case 'domains': title.textContent = 'Domains'; await loadDomains(content); break;
                case 'webhooks': title.textContent = 'Webhooks'; await loadWebhooks(content); break;
                case 'stats': title.textContent = 'Statistics'; await loadStats(content); break;
            }
        }

        // ===== DASHBOARD =====
        async function loadDashboard(el) {
            try {
                const data = await api('/dashboard');
                if (!data.success) throw new Error(data.message);
                const d = data.data;
                el.innerHTML = `
                    <h2 class="page-title">Dashboard</h2>
                    <p class="page-subtitle">Overview of your JoeMail instance</p>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-envelope"></i></div>
                            <div class="stat-value">${d.stats.totalEmails || 0}</div>
                            <div class="stat-label">Total Emails</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                            <div class="stat-value">${d.stats.totalAddresses || 0}</div>
                            <div class="stat-label">Addresses</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-globe"></i></div>
                            <div class="stat-value">${d.stats.totalDomains || 0}</div>
                            <div class="stat-label">Domains</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-clock"></i></div>
                            <div class="stat-value">${Math.round(d.systemHealth.uptime / 60)}m</div>
                            <div class="stat-label">Uptime</div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3>Recent Emails</h3>
                            <span class="badge">${(d.recentEmails || []).length} recent</span>
                        </div>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>Email</th><th>From</th><th>Subject</th><th>Date</th></tr></thead>
                                <tbody>
                                    ${(d.recentEmails || []).map(e => `<tr><td>${e.email}</td><td>${e.from || '-'}</td><td>${e.subject || '-'}</td><td>${formatDate(e.date)}</td></tr>`).join('') || '<tr><td colspan="4" class="empty-state">No emails yet</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            } catch (e) { el.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${e.message}</p></div>`; }
        }

        // ===== EMAILS =====
        async function loadEmails(el) {
            try {
                const data = await api('/emails');
                if (!data.success) throw new Error(data.message);
                const d = data.data;
                el.innerHTML = `
                    <h2 class="page-title">Emails</h2>
                    <p class="page-subtitle">Manage all received emails</p>
                    <div class="card">
                        <div class="card-header">
                            <h3>All Emails</h3>
                            <span class="badge">${d.pagination.total} total</span>
                        </div>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>ID</th><th>Email</th><th>From</th><th>Subject</th><th>Size</th><th>Date</th><th>Act</th></tr></thead>
                                <tbody>
                                    ${(d.emails || []).map(e => `<tr>
                                        <td>${e.id}</td>
                                        <td><span class="status ok">${e.email}</span></td>
                                        <td>${e.from || '-'}</td>
                                        <td>${e.subject || '-'}</td>
                                        <td>${e.size}</td>
                                        <td>${formatDate(e.date)}</td>
                                        <td><button class="btn-danger btn-sm" onclick="deleteEmail(${e.id})"><i class="fas fa-trash"></i></button></td>
                                    </tr>`).join('') || '<tr><td colspan="7" class="empty-state">No emails</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            } catch (e) { el.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${e.message}</p></div>`; }
        }

        // ===== DOMAINS =====
        async function loadDomains(el) {
            try {
                const data = await api('/domains');
                if (!data.success) throw new Error(data.message);
                const d = data.data;
                el.innerHTML = `
                    <h2 class="page-title">Domains</h2>
                    <p class="page-subtitle">Manage custom domains for email addresses</p>
                    <div style="margin-bottom: 16px;">
                        <button class="btn-primary" onclick="openModal('modal-add-domain')"><i class="fas fa-plus"></i> Add Domain</button>
                    </div>
                    <div class="card">
                        <div class="card-header">
                            <h3>Registered Domains</h3>
                            <span class="badge">${(d.domains || []).length} domains</span>
                        </div>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>Domain</th><th>Status</th><th>Verified</th><th>Created</th><th>Act</th></tr></thead>
                                <tbody>
                                    ${(d.domains || []).map(dm => `<tr>
                                        <td style="font-weight:600;">${dm.domain}</td>
                                        <td><span class="status ${dm.isActive ? 'ok' : 'error'}">${dm.isActive ? 'Active' : 'Inactive'}</span></td>
                                        <td><span class="status ${dm.isVerified ? 'ok' : 'warning'}">${dm.isVerified ? 'Verified' : 'Pending'}</span></td>
                                        <td>${formatDate(dm.createdAt)}</td>
                                        <td>
                                            <button class="btn-ghost btn-sm" onclick="viewDomainDetail('${dm.domain}')" title="View DNS"><i class="fas fa-eye"></i></button>
                                            <button class="btn-danger btn-sm" onclick="deleteDomain('${dm.domain}')" title="Delete"><i class="fas fa-trash"></i></button>
                                        </td>
                                    </tr>`).join('') || '<tr><td colspan="5" class="empty-state">No domains</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            } catch (e) { el.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${e.message}</p></div>`; }
        }

        // ===== ADD DOMAIN =====
        async function addDomain() {
            const domain = document.getElementById('new-domain').value.trim();
            if (!domain) { toast('Enter a domain name', 'error'); return; }

            try {
                const data = await fetch('/api/domain/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ domain })
                }).then(r => r.json());

                if (!data.success) throw new Error(data.message);

                // Show DNS instructions
                const vr = data.data.verificationRecord;
                const dnsList = document.getElementById('dns-records-list');
                dnsList.innerHTML = `
                    <div class="dns-box">
                        <button class="copy-btn" onclick="copyDNS(this)" data-value="Type: TXT\\nName: ${domain}\\nValue: ${vr}"><i class="fas fa-copy"></i> Copy</button>
                        <div><span class="dns-record-type">Type:</span> TXT</div>
                        <div><span class="dns-record-name">Name:</span> ${domain}</div>
                        <div><span class="dns-record-value">Value:</span> ${vr}</div>
                    </div>
                    <div class="dns-box" style="margin-top:8px;">
                        <button class="copy-btn" onclick="copyDNS(this)" data-value="Type: MX\\nName: @\\nValue: mail.${domain}\\nPriority: 10"><i class="fas fa-copy"></i> Copy</button>
                        <div><span class="dns-record-type">Type:</span> MX</div>
                        <div><span class="dns-record-name">Name:</span> @</div>
                        <div><span class="dns-record-value">Value:</span> mail.${domain} &nbsp; <span style="color:var(--text-muted)">Priority: 10</span></div>
                    </div>
                    <div class="dns-box" style="margin-top:8px;">
                        <button class="copy-btn" onclick="copyDNS(this)" data-value="Type: A\\nName: mail.${domain}\\nValue: YOUR_SERVER_IP"><i class="fas fa-copy"></i> Copy</button>
                        <div><span class="dns-record-type">Type:</span> A</div>
                        <div><span class="dns-record-name">Name:</span> mail.${domain}</div>
                        <div><span class="dns-record-value">Value:</span> YOUR_SERVER_IP</div>
                    </div>
                    <div class="dns-box" style="margin-top:8px;">
                        <button class="copy-btn" onclick="copyDNS(this)" data-value="Type: TXT\\nName: @\\nValue: v=spf1 mx a ~all"><i class="fas fa-copy"></i> Copy</button>
                        <div><span class="dns-record-type">Type:</span> TXT (SPF)</div>
                        <div><span class="dns-record-name">Name:</span> @</div>
                        <div><span class="dns-record-value">Value:</span> v=spf1 mx a ~all</div>
                    </div>
                    <p style="font-size:11px; color:var(--text-muted); margin-top:10px;">
                        <i class="fas fa-info-circle"></i> Add all records in Cloudflare, then click Verify on the domain.
                    </p>`;

                document.getElementById('dns-instructions').style.display = 'block';
                document.getElementById('btn-add-domain').textContent = 'Close';
                document.getElementById('btn-add-domain').onclick = () => { closeModal('modal-add-domain'); resetAddDomainModal(); loadPage('domains'); };

                toast('Domain registered! Add DNS records in Cloudflare.');
            } catch (e) { toast(e.message, 'error'); }
        }

        function resetAddDomainModal() {
            document.getElementById('new-domain').value = '';
            document.getElementById('dns-instructions').style.display = 'none';
            document.getElementById('btn-add-domain').textContent = 'Add Domain';
            document.getElementById('btn-add-domain').onclick = addDomain;
        }

        function copyDNS(btn) {
            const val = btn.dataset.value;
            navigator.clipboard.writeText(val.replace(/\\n/g, '\n')).then(() => {
                btn.innerHTML = '<i class="fas fa-check"></i> Copied';
                setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> Copy'; }, 1500);
            });
        }

        // ===== DOMAIN DETAIL =====
        async function viewDomainDetail(domain) {
            try {
                const data = await fetch(`/api/domain/verify/${domain}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                }).then(r => r.json());

                document.getElementById('detail-domain-name').textContent = domain;
                const vr = data.data.verificationRecord || 'Already verified';
                const isVerified = data.data.verified;

                document.getElementById('domain-detail-content').innerHTML = `
                    <div style="margin-bottom:16px;">
                        <span class="status ${isVerified ? 'ok' : 'warning'}">${isVerified ? 'Verified' : 'Pending Verification'}</span>
                    </div>
                    <p style="font-size:13px; color:var(--text-secondary); margin-bottom:12px;">Required DNS records for Cloudflare:</p>
                    <div class="dns-box">
                        <button class="copy-btn" onclick="copyDNS(this)" data-value="Type: TXT\\nName: ${domain}\\nValue: ${vr}"><i class="fas fa-copy"></i> Copy</button>
                        <div><span class="dns-record-type">Type:</span> TXT</div>
                        <div><span class="dns-record-name">Name:</span> ${domain}</div>
                        <div><span class="dns-record-value">Value:</span> ${vr}</div>
                    </div>
                    <div class="dns-box" style="margin-top:8px;">
                        <button class="copy-btn" onclick="copyDNS(this)" data-value="Type: MX\\nName: @\\nValue: mail.${domain}\\nPriority: 10"><i class="fas fa-copy"></i> Copy</button>
                        <div><span class="dns-record-type">Type:</span> MX</div>
                        <div><span class="dns-record-name">Name:</span> @</div>
                        <div><span class="dns-record-value">Value:</span> mail.${domain} &nbsp; <span style="color:var(--text-muted)">Priority: 10</span></div>
                    </div>
                    <div class="dns-box" style="margin-top:8px;">
                        <button class="copy-btn" onclick="copyDNS(this)" data-value="Type: A\\nName: mail.${domain}\\nValue: YOUR_SERVER_IP"><i class="fas fa-copy"></i> Copy</button>
                        <div><span class="dns-record-type">Type:</span> A</div>
                        <div><span class="dns-record-name">Name:</span> mail.${domain}</div>
                        <div><span class="dns-record-value">Value:</span> YOUR_SERVER_IP</div>
                    </div>
                    <div class="dns-box" style="margin-top:8px;">
                        <button class="copy-btn" onclick="copyDNS(this)" data-value="Type: TXT\\nName: @\\nValue: v=spf1 mx a ~all"><i class="fas fa-copy"></i> Copy</button>
                        <div><span class="dns-record-type">Type:</span> TXT (SPF)</div>
                        <div><span class="dns-record-name">Name:</span> @</div>
                        <div><span class="dns-record-value">Value:</span> v=spf1 mx a ~all</div>
                    </div>
                    ${!isVerified ? `<div style="margin-top:14px;">
                        <button class="btn-primary" onclick="verifyDomain('${domain}')"><i class="fas fa-check"></i> Verify Now</button>
                    </div>` : ''}`;

                openModal('modal-domain-detail');
            } catch (e) { toast(e.message, 'error'); }
        }

        async function verifyDomain(domain) {
            try {
                const data = await fetch(`/api/domain/verify/${domain}`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                }).then(r => r.json());
                if (data.success) {
                    toast('Domain verified!');
                    closeModal('modal-domain-detail');
                    loadPage('domains');
                } else {
                    toast(data.message || 'Verification failed', 'error');
                }
            } catch (e) { toast(e.message, 'error'); }
        }

        async function deleteDomain(domain) {
            if (!confirm('Delete domain ' + domain + '?')) return;
            try {
                const data = await fetch(`/api/domain/${domain}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                }).then(r => r.json());
                if (data.success) { toast('Domain deleted'); loadPage('domains'); }
                else { toast(data.message || 'Failed', 'error'); }
            } catch (e) { toast(e.message, 'error'); }
        }

        // ===== WEBHOOKS =====
        async function loadWebhooks(el) {
            try {
                const data = await api('/webhooks');
                if (!data.success) throw new Error(data.message);
                const d = data.data;
                el.innerHTML = `
                    <h2 class="page-title">Webhooks</h2>
                    <p class="page-subtitle">Manage webhook endpoints</p>
                    <div class="card">
                        <div class="card-header">
                            <h3>Configured Webhooks</h3>
                            <span class="badge">${(d.webhooks || []).length} webhooks</span>
                        </div>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>URL</th><th>Events</th><th>Status</th><th>OK</th><th>Fail</th><th>Last</th></tr></thead>
                                <tbody>
                                    ${(d.webhooks || []).map(w => `<tr>
                                        <td style="max-width:260px; overflow:hidden; text-overflow:ellipsis;">${w.url}</td>
                                        <td>${w.events}</td>
                                        <td><span class="status ${w.isActive ? 'ok' : 'error'}">${w.isActive ? 'Active' : 'Off'}</span></td>
                                        <td>${w.successCount}</td>
                                        <td>${w.failureCount}</td>
                                        <td>${formatDate(w.lastTriggered)}</td>
                                    </tr>`).join('') || '<tr><td colspan="6" class="empty-state">No webhooks</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            } catch (e) { el.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${e.message}</p></div>`; }
        }

        // ===== STATS =====
        async function loadStats(el) {
            try {
                const data = await api('/stats');
                if (!data.success) throw new Error(data.message);
                const d = data.data;
                el.innerHTML = `
                    <h2 class="page-title">Statistics</h2>
                    <p class="page-subtitle">Usage statistics and trends</p>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-envelope"></i></div>
                            <div class="stat-value">${d.totals.totalEmails || 0}</div>
                            <div class="stat-label">Total Emails</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                            <div class="stat-value">${d.totals.totalAddresses || 0}</div>
                            <div class="stat-label">Addresses</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-trash"></i></div>
                            <div class="stat-value">${d.totals.totalDeleted || 0}</div>
                            <div class="stat-label">Deleted</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-share"></i></div>
                            <div class="stat-value">${d.totals.totalForwarded || 0}</div>
                            <div class="stat-label">Forwarded</div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header"><h3>Daily (Last 30 Days)</h3></div>
                        <div class="table-wrap">
                            <table>
                                <thead><tr><th>Date</th><th>Emails</th><th>Addresses</th><th>Deleted</th></tr></thead>
                                <tbody>
                                    ${(d.daily || []).map(s => `<tr><td>${s.date}</td><td>${s.emails_received}</td><td>${s.addresses_created}</td><td>${s.emails_deleted}</td></tr>`).join('') || '<tr><td colspan="4" class="empty-state">No data</td></tr>'}
                                </tbody>
                            </table>
                        </div>
                    </div>`;
            } catch (e) { el.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>${e.message}</p></div>`; }
        }

        // ===== ACTIONS =====
        async function deleteEmail(id) {
            if (!confirm('Delete this email?')) return;
            try {
                const data = await api('/email/' + id, { method: 'DELETE' });
                if (data.success) { toast('Email deleted'); loadPage('emails'); }
                else { toast(data.message || 'Failed', 'error'); }
            } catch (e) { toast(e.message, 'error'); }
        }

        // ===== INIT =====
        if (token) {
            api('/dashboard').then(data => {
                if (data.success) showApp();
                else doLogout();
            }).catch(() => doLogout());
        }

        document.getElementById('login-password').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
        document.querySelectorAll('.modal-overlay').forEach(m => {
            m.addEventListener('click', e => { if (e.target === m) m.classList.remove('show'); });
        });
    </script>
</body>
</html>
