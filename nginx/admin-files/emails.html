<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JoeMail Admin - Emails</title>
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/admin/admin.css?v=7">
</head>
<body>
    <div class="app-layout">
        <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="logo-icon">J</div>
                <div>
                    <h1>JoeMail</h1>
                    <p>Admin Console</p>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-group">
                    <div class="nav-label">Main</div>
                    <a class="nav-item" data-page="dashboard" href="/admin/dashboard">
                        <i class="fas fa-chart-pie"></i><span>Dashboard</span>
                    </a>
                    <a class="nav-item active" data-page="emails" href="/admin/emails">
                        <i class="fas fa-envelope"></i><span>Emails</span>
                    </a>
                    <a class="nav-item" data-page="addresses" href="/admin/addresses">
                        <i class="fas fa-at"></i><span>Addresses</span>
                    </a>
                    <a class="nav-item" data-page="domains" href="/admin/domains">
                        <i class="fas fa-globe"></i><span>Domains</span>
                    </a>
                </div>
                <div class="nav-group">
                    <div class="nav-label">System</div>
                    <a class="nav-item" data-page="relay" href="/admin/relay">
                        <i class="fas fa-server"></i><span>SMTP Relay</span>
                    </a>
                    <a class="nav-item" data-page="stats" href="/admin/stats">
                        <i class="fas fa-chart-bar"></i><span>Statistics</span>
                    </a>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="nav-item" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
            </div>
        </aside>

        <main class="main-wrap">
            <header class="app-header">
                <div class="header-left">
                    <button class="mobile-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <span class="header-title">Emails</span>
                </div>
                <div class="header-right">
                    <div class="header-badge"><span class="dot"></span><span>Online</span></div>
                    <button class="btn-ghost" onclick="window.open('/', '_blank')"><i class="fas fa-external-link-alt"></i> <span>Frontend</span></button>
                </div>
            </header>
            <div class="content" id="content">
                <div class="empty-state"><div class="spinner" style="margin:0 auto;"></div></div>
            </div>
        </main>
    </div>

    <!-- VIEW EMAIL MODAL -->
    <div id="modal-view-email" class="modal-overlay">
        <div class="modal" style="max-width:640px;">
            <h2 id="email-view-subject" style="font-size:16px;word-break:break-word;">Loading...</h2>
            <div id="email-view-meta" style="margin-bottom:12px;"></div>
            <div id="email-view-body" style="margin-top:12px;"></div>
            <div class="modal-actions">
                <button class="btn-ghost" onclick="closeModal('modal-view-email')">Close</button>
            </div>
        </div>
    </div>

    <!-- REPLY MODAL -->
    <div id="modal-reply" class="modal-overlay">
        <div class="modal" style="max-width:520px;">
            <h2><i class="fas fa-reply"></i> Reply Email</h2>
            <div class="form-group">
                <label>From</label>
                <input type="text" id="reply-from" class="form-input" placeholder="sender@domain.com" list="reply-from-suggestions">
                <datalist id="reply-from-suggestions"></datalist>
            </div>
            <div class="form-group">
                <label>To</label>
                <div id="reply-to" style="padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xs);font-size:13px;color:var(--text-secondary);">-</div>
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="reply-subject" class="form-input" placeholder="Re: ...">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="reply-body" class="form-input" rows="6" placeholder="Type your reply..." style="resize:vertical;min-height:120px;"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-ghost" onclick="closeModal('modal-reply')">Cancel</button>
                <button class="btn-primary" id="btn-send-reply" onclick="sendReply()">Send Reply</button>
            </div>
        </div>
    </div>

    <!-- COMPOSE MODAL -->
    <div id="modal-compose" class="modal-overlay">
        <div class="modal" style="max-width:520px;">
            <h2><i class="fas fa-pen"></i> Compose Email</h2>
            <div class="form-group">
                <label>From</label>
                <input type="text" id="compose-from" class="form-input" placeholder="sender@domain.com" list="from-suggestions">
                <datalist id="from-suggestions"></datalist>
            </div>
            <div class="form-group">
                <label>To <span style="font-weight:400;color:var(--text-muted);">(comma-separated for multiple)</span></label>
                <input type="text" id="compose-to" class="form-input" placeholder="user1@example.com, user2@example.com">
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="compose-subject" class="form-input" placeholder="Subject">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="compose-body" class="form-input" rows="8" placeholder="Type your message..." style="resize:vertical;min-height:150px;"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-ghost" onclick="closeModal('modal-compose')">Cancel</button>
                <button class="btn-primary" id="btn-send-compose" onclick="sendCompose()"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="/admin/admin.js"></script>
    <script src="/admin/emails.js?v=7"></script>
</body>
</html>
