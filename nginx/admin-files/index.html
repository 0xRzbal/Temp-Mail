<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JoeMail Admin - Login</title>
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/admin/admin.css?v=4">
</head>
<body>
    <div id="login-page" class="login-page">
        <div class="login-card">
            <div class="login-brand">
                <div class="logo-icon">J</div>
                <h1>JoeMail Admin</h1>
                <p>Mail operations console</p>
            </div>
            <input type="text" id="login-username" placeholder="Username" autocomplete="username">
            <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
            <button class="btn-login" onclick="doLogin()">Sign In</button>
            <div id="login-error" class="login-error"></div>
        </div>
    </div>
    <script src="/admin/admin.js"></script>
    <script>
        if (token) {
            api('/dashboard').then(data => {
                if (data.success) window.location.href = '/admin/dashboard';
                else localStorage.removeItem('admin_token');
            }).catch(() => localStorage.removeItem('admin_token'));
        }
    </script>
</body>
</html>
