<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JoeMail Admin - Dashboard</title>
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/admin/admin.css">
    
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <main class="main-wrap" id="main-content">
            <div id="header-container"></div>
            <div class="content" id="content">
                <div class="empty-state"><div class="spinner" style="margin:0 auto;"></div></div>
            </div>
        </main>
    </div>
    
    <div id="toast" class="toast"></div>
    <script src="/admin/admin.js"></script>
    <script src="/admin/template.js"></script>
    <script src="/admin/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (requireAuth()) {
                document.getElementById('sidebar-container').innerHTML = renderSidebar();
                document.getElementById('header-container').innerHTML = renderHeader('Dashboard');
                // The dashboard.js script will be dynamically loaded and initDashboard called by admin.js
                // No need for a separate init call here
            }
        });

        // The remaining dashboard-specific JavaScript
        function fetchDashboardData() {
            api('/stats').then(data => {
                if (data.success) {
                    const d = data.data;
                    document.getElementById('total-emails').textContent = d.totalEmails;
                    document.getElementById('total-domains').textContent = d.totalDomains;
                    document.getElementById('total-aliases').textContent = d.totalAliases;
                    document.getElementById('emails-24h').textContent = d.emails24h;
                    document.getElementById('domains-active').textContent = d.activeDomains;
                    document.getElementById('aliases-active').textContent = d.activeAliases;
                    renderChart(d.emailTraffic);
                } else {
                    toast('Error fetching dashboard data: ' + data.message, 'error');
                }
            }).catch(e => {
                toast('Network error fetching dashboard data.', 'error');
                console.error(e);
            });
        }
        
        function renderChart(emailTraffic) {
            const ctx = document.getElementById('emailTrafficChart').getContext('2d');
            const labels = emailTraffic.map(item => formatDate(item.date));
            const sent = emailTraffic.map(item => item.sent);
            const received = emailTraffic.map(item => item.received);
        
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Sent', data: sent, borderColor: 'rgb(75, 192, 192)', tension: 0.1 },
                        { label: 'Received', data: received, borderColor: 'rgb(255, 99, 132)', tension: 0.1 }
                    ]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }
    </script>
</body>
