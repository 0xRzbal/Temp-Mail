<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.bunny.net">
    <link href="https://fonts.bunny.net/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JoeMail Admin - Emails</title>
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body>
    <div class="app-layout">
        <div id="sidebar-container"></div>
        <main class="main-wrap" id="main-content">
            <div id="header-container"></div>
            <div class="content" id="content">
                <div class="empty-state"><div class="spinner" style="margin:0 auto;"></div></div>
            </div>
        </main>
    </div>

    <!-- VIEW EMAIL MODAL -->
    <div id="modal-view-email" class="modal-overlay">
        <div class="modal" style="max-width:640px;">
            <h2 id="email-view-subject" style="font-size:16px;word-break:break-word;">Loading...</h2>
            <div id="email-view-from" style="display:none;"></div>
            <div id="email-view-to" style="display:none;"></div>
            <div id="email-view-date" style="display:none;"></div>
            <div id="email-view-body" style="margin-top:12px;"></div>
            <div class="modal-actions">
                <button class="btn-ghost" onclick="closeModal('modal-view-email')">Close</button>
            </div>
        </div>
    </div>

    <!-- REPLY MODAL -->
    <div id="modal-reply" class="modal-overlay">
        <div class="modal" style="max-width:520px;">
            <h2><i class="fas fa-reply"></i> Reply Email</h2>
            <div class="form-group">
                <label>To</label>
                <div id="reply-to" style="padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xs);font-size:13px;color:var(--text-secondary);">-</div>
            </div>
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="reply-subject" class="form-input" placeholder="Re: ...">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea id="reply-body" class="form-input" rows="6" placeholder="Type your reply..." style="resize:vertical;min-height:120px;"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn-ghost" onclick="closeModal('modal-reply')">Cancel</button>
                <button class="btn-primary" id="btn-send-reply" onclick="sendReply()">Send Reply</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="/admin/admin.js"></script>
    <script src="/admin/template.js"></script>
    <script src="/admin/emails.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (requireAuth()) {
                document.getElementById('sidebar-container').innerHTML = renderSidebar();
                document.getElementById('header-container').innerHTML = renderHeader('Emails');
                // The emails.js script will be dynamically loaded and initEmails called by admin.js
            }
        });
        
        function initEmails() {
            loadEmails();
        }
    </script>
</body>
</html>
