<!DOCTYPE html>
<html dir="ltr" class="ltr" lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JoeMail</title>
    <link rel="icon" href="/images/logo.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link href="https://fonts.bunny.net/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" integrity="sha512-+4zCK9k+qNFUR5X+cKL9EIR+ZOhtIloNl9GIKS57V1MyNsYpYcUrUeQc9vNfzsWfV28IaLL3i96P9sdNyeRssA==" crossorigin="anonymous" />
    <link rel="stylesheet" href="/build/assets/app-BSyY0X6t.css" />
    <link rel="stylesheet" href="/build/assets/common-CM5FHs_M.css" />
    <link rel="stylesheet" href="/css/app.css?v=20260618-viewfix2" />
</head>
<body class="bg-gray-900 text-gray-200" style="background: linear-gradient(180deg, #1a1a1a, #1f1f1f 52%, #242424);">
    <div class="groot-theme flex flex-col min-h-screen" style="background-image: linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px); background-size: 54px 54px;">
        <!-- ============================================================ -->
        <!-- HEADER -->
        <!-- ============================================================ -->
        <header class="bg-primary text-white">
            <!-- Top row: darkmode | logo | nav+hamburger -->
            <div class="logo flex justify-center p-5 lg:p-10 lg:justify-start">
                <a href="/" class="no-underline">
                    <span style="font-family: 'Inter', sans-serif; font-size: 1.35rem; font-weight: 700; color: #fff; letter-spacing: -0.02em;">JoeMail</span>
                </a>
            </div>

            <!-- ============================================================ -->
            <!-- EMAIL SECTION (inside header, 3-column grid) -->
            <!-- ============================================================ -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-5 pb-5 lg:pb-10">
                <!-- Left ad placeholder -->
                <div class="flex justify-center items-center max-w-full m-4"></div>

                <!-- Center: email box + actions -->
                <div class="px-5 lg:px-0 w-full flex items-center justify-center" id="email-section">
                    <!-- DEFAULT VIEW -->
                    <div id="email-view" class="flex-1 space-y-5 view-anim open">
                        <div class="border-2 border-white border-opacity-10 border-dashed rounded-md flex flex-col">
                            <div class="text-lg font-bold text-center mt-4 mb-1">Your Email Address</div>
                            <div class="m-3 flex space-x-3">
                                <!-- Email dropdown -->
                                <div class="relative flex-1">
                                    <div class="relative" id="email-dropdown-wrap">
                                        <div id="email-dropdown-btn">
                                            <div class="block appearance-none w-full bg-white text-white py-4 px-5 pr-8 bg-opacity-10 rounded-md cursor-pointer focus:outline-none select-none" id="email-display">Loading...</div>
                                        </div>
                                        <div id="email-dropdown-menu" class="absolute z-50 mt-2 w-full rounded-md shadow-lg origin-top hidden dropdown-anim max-h-60 overflow-y-auto">
                                            <div class="rounded-md ring-1 ring-black ring-opacity-5 py-1 bg-gray-700" id="email-dropdown-list">
                                                <!-- populated by JS -->
                                            </div>
                                        </div>
                                    </div>
                                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-white">
                                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                                            <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                                        </svg>
                                    </div>
                                </div>
                                <!-- Copy button -->
                                <div id="btn-copy" class="btn-press btn_copy flex items-center bg-indigo-600 rounded-md text-white text-center py-4 px-5 hover:bg-opacity-75 cursor-pointer">
                                    <i class="far fa-copy"></i>
                                </div>

                            </div>
                        </div>

                        <!-- Action buttons -->
                        <div class="actions grid grid-cols-3 gap-3">
                            <div id="btn-refresh" class="btn-press flex justify-center items-center bg-white bg-opacity-10 hover:bg-opacity-25 text-white rounded-md text-center cursor-pointer py-3 px-4">
                                <i id="refresh-icon" class="fas fa-sync-alt fa-spin pause-spinner"></i>
                                <div class="text-sm ml-3">Refresh</div>
                            </div>
                            <div id="btn-delete" class="btn-press flex justify-center items-center bg-white bg-opacity-10 hover:bg-opacity-25 text-white rounded-md text-center cursor-pointer py-3 px-4">
                                <i class="far fa-trash-alt"></i>
                                <div class="text-sm ml-3">Delete</div>
                            </div>
                            <div id="btn-new" class="btn-press flex justify-center items-center bg-white bg-opacity-10 hover:bg-opacity-25 text-white rounded-md text-center cursor-pointer py-3 px-4">
                                <i class="far fa-plus-square"></i>
                                <div class="text-sm ml-3">New</div>
                            </div>

                        </div>
                    </div>



                    <!-- NEW EMAIL FORM (hidden by default) -->
                    <div id="new-email-view" class="flex-1 space-y-5 hidden view-anim">
                        <div class="border-2 border-white border-opacity-10 border-dashed rounded-md">
                            <div class="m-3 flex space-x-3">
                                <div class="flex-1 space-x-3 flex">
                                    <div class="flex-1 space-y-3">
                                        <input class="block border-0 appearance-none w-full rounded-md py-4 px-5 bg-white text-white bg-opacity-10 focus:outline-none placeholder-white placeholder-opacity-50" type="text" id="new-username" placeholder="Enter Username" />
                                        <!-- Domain selector -->
                                        <div class="relative">
                                            <div id="domain-dropdown-wrap" class="relative">
                                                <div id="domain-dropdown-btn">
                                                    <input type="text" class="block border-0 appearance-none w-full bg-white text-white py-4 px-5 pr-8 bg-opacity-10 rounded-md cursor-pointer focus:outline-none select-none placeholder-white placeholder-opacity-50" placeholder="Select Domain" id="domain-display" readonly />
                                                </div>
                                                <div id="domain-dropdown-menu" class="absolute z-50 mt-2 w-full rounded-md shadow-lg origin-top hidden dropdown-anim">
                                                    <div class="rounded-md ring-1 ring-black ring-opacity-5 py-1 bg-gray-700" id="domain-dropdown-list">
                                                        <!-- populated by JS -->
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-white">
                                                <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                                                    <path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/>
                                                </svg>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- Create button -->
                                    <button id="btn-create-email" class="flex items-center bg-indigo-600 rounded-md text-white text-center py-4 px-5 hover:bg-opacity-75 cursor-pointer">
                                        <i class="fas fa-chevron-right"></i>
                                    </button>
                                </div>
                                <!-- Separator -->
                                <div class="flex items-center">
                                    <div class="border border-dashed border-white h-6"></div>
                                </div>
                                <!-- Random button -->
                                <div id="btn-random" class="flex items-center bg-indigo-600 rounded-md text-white text-center py-4 px-5 hover:bg-opacity-75 cursor-pointer">
                                    <i class="fas fa-random"></i>
                                </div>
                            </div>
                        </div>
                        <!-- Cancel -->
                        <div id="btn-cancel" class="flex justify-center items-center bg-white bg-opacity-25 rounded-md text-white text-center py-3 px-5 hover:bg-opacity-10 cursor-pointer text-sm">
                            <span>Cancel</span>
                        </div>
                    </div>
                </div>

                <!-- Right ad placeholder -->
                <div class="hidden lg:flex justify-center items-center max-w-full"></div>
            </div>
        </header>

        <!-- ============================================================ -->
        <!-- INBOX SECTION (below header, with ad columns) -->
        <!-- ============================================================ -->
        <div class="flex-1 grid grid-cols-1 lg:grid-cols-6 gap-5 bg-gray-900 py-5 lg:py-10 view-anim open" id="inbox-section">
            <!-- Left ad -->
            <div class="flex justify-center items-center max-w-full"></div>

            <!-- Inbox content -->
            <div class="col-span-4 mx-5 lg:mx-0">
                <div id="inbox-container">
                    <!-- Empty / Loading state -->
                    <div id="inbox-empty" class="bg-gray-800 text-sm rounded-lg">
                        <div class="flex items-center">
                            <div class="flex-1 flex flex-col justify-center items-center text-gray-400 h-80">
                                <div class="text-3xl mb-5"><i class="fas fa-circle-notch fa-spin"></i></div>
                                <div class="text-lg">No Messages</div>
                                <div class="mt-1">Waiting for Incoming Messages</div>
                            </div>
                        </div>
                    </div>
                    <!-- Messages list (hidden by default) -->
                    <div id="inbox-list" class="hidden space-y-3"></div>
                </div>

                <!-- Email detail (hidden by default) — moved outside inbox-section to avoid parent hiding it -->
            </div>

            <!-- Right ad -->
            <div class="flex justify-center items-center max-w-full"></div>
        </div>

        <!-- Email detail (sibling of inbox-section, not nested) -->
        <div class="flex-1 grid grid-cols-1 lg:grid-cols-6 gap-5 bg-gray-900 py-5 lg:py-10 hidden view-anim" id="email-detail">
            <div class="flex justify-center items-center max-w-full"></div>
            <div class="col-span-4 mx-5 lg:mx-0">
                <div class="bg-gray-800 text-sm rounded-lg p-6">
                    <!-- Back button + Delete -->
                    <div class="flex items-center justify-between mb-5">
                        <button id="btn-back-inbox" class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors">
                            <i class="fas fa-arrow-left"></i>Back to Inbox
                        </button>
                        <button id="btn-delete-detail" class="flex items-center gap-2 text-red-400 hover:text-red-300 transition-colors px-3 py-1.5 rounded-md hover:bg-red-400/10">
                            <i class="far fa-trash-alt"></i>Delete
                        </button>
                    </div>

                    <!-- Email meta info -->
                    <div class="space-y-3">
                        <div class="flex items-start gap-3">
                            <span class="email-meta-label min-w-[60px]">From</span>
                            <span id="detail-from" class="email-meta-value"></span>
                        </div>
                        <div class="flex items-start gap-3">
                            <span class="email-meta-label min-w-[60px]">Subject</span>
                            <span id="detail-subject" class="email-meta-value font-semibold"></span>
                        </div>
                        <div class="flex items-start gap-3">
                            <span class="email-meta-label min-w-[60px]">Date</span>
                            <span id="detail-date" class="email-meta-value"></span>
                        </div>
                    </div>

                    <hr class="border-gray-700" />

                    <!-- Email body -->
                    <div id="detail-body" class="prose prose-invert max-w-none"></div>
                </div>
            </div>
            <div class="flex justify-center items-center max-w-full"></div>
        </div>

        <!-- ============================================================ -->
        <!-- FOOTER -->
        <!-- ============================================================ -->
        <footer class="bg-gray-950 px-6 py-4 text-white text-sm">
            <div class="flex justify-center items-center">
                <div class="opacity-75 text-gray-300 text-center">Copyright &copy; 2026 JoeMail. All rights reserved.</div>
            </div>
        </footer>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-5 right-5 bg-green-600 text-white px-4 py-3 rounded-md shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50"></div>

    <script src="/js/app.js?v=20260618-viewfix2"></script>
</body>
</html>
